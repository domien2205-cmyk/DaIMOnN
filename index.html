<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>DAEMON • v2.0 EPIC</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://js.puter.com/v2/"></script>
<style>
:root{--neon:#00ff9d;--pink:#ff00ff;--cyan:#00f0ff;--bg:#000;--surf:#0a0a0a;--border:rgba(0,255,157,.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--neon);height:100dvh;overflow:hidden;position:fixed;width:100%;touch-action:manipulation}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,157,.03) 3px,rgba(0,255,157,.03) 6px);pointer-events:none;z-index:9999;animation:scan 12s linear infinite}
@keyframes scan{0%{background-position:0 0}100%{background-position:0 100%}}
.tab-bar{display:flex;background:#000;border-bottom:3px solid var(--neon);z-index:200}
.tab-btn{flex:1;padding:14px 8px;font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;background:transparent;border:none;color:rgba(0,255,157,.6);transition:.2s}
.tab-btn.active{color:var(--neon);background:rgba(0,255,157,.12);border-bottom:4px solid var(--neon);box-shadow:0 0 25px var(--neon)}
.screen{display:none;height:calc(100dvh - 51px);flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.daemon-header{background:rgba(10,10,10,.98);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 0 30px rgba(0,255,157,.25)}
.glitch{font-size:1.35rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;animation:glitch 1.8s infinite linear}
@keyframes glitch{0%,100%{text-shadow:3px 0 var(--pink),-3px 0 var(--cyan)}50%{text-shadow:-3px 0 var(--pink),3px 0 var(--cyan)}}
.sensor-bar{background:rgba(5,5,5,.97);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.chip{background:rgba(0,30,20,.8);border:1px solid var(--neon);color:var(--neon);padding:6px 14px;border-radius:9999px;font-size:.78rem;white-space:nowrap;flex-shrink:0;transition:.3s}
.chip.active{background:var(--neon);color:#000;box-shadow:0 0 15px var(--neon)}
.chat-container{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.message{max-width:88%;padding:13px 16px;border-radius:12px;line-height:1.5;font-size:.96rem;animation:msg 0.3s ease}
.message.user{align-self:flex-end;background:rgba(0,60,40,.7);border-left:4px solid var(--neon)}
.message.assistant{align-self:flex-start;background:rgba(50,0,45,.7);border-right:4px solid var(--pink)}
.thinking{color:var(--pink);display:flex;gap:5px;align-items:center;font-style:italic}
.dot{width:6px;height:6px;background:var(--pink);border-radius:50%;animation:bounce 1.3s infinite}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.input-area{background:rgba(5,5,5,.98);border-top:3px solid var(--neon);padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
textarea{flex:1;background:rgba(0,25,15,.9);border:2px solid var(--neon);color:var(--neon);padding:14px 16px;border-radius:12px;font-size:1rem;resize:none;min-height:52px;max-height:140px;outline:none}
button{background:rgba(0,255,157,.15);border:2px solid var(--neon);color:var(--neon);padding:14px 18px;border-radius:12px;font-weight:900;cursor:pointer;transition:.2s}
button:active{transform:scale(.92);background:var(--neon);color:#000}
.activation-overlay{position:absolute;inset:0;background:rgba(0,0,0,.99);display:flex;align-items:center;justify-content:center;z-index:9999}
.activation-box{background:linear-gradient(135deg,rgba(255,0,255,.1),rgba(0,255,157,.1));border:3px solid var(--pink);padding:40px 28px;border-radius:20px;text-align:center;max-width:380px;box-shadow:0 0 60px rgba(255,0,255,.4)}
.activate-btn{width:100%;padding:18px;font-size:1.2rem;font-weight:900;letter-spacing:3px;border:3px solid var(--neon);background:transparent;color:var(--neon);border-radius:12px;cursor:pointer}
.activate-btn:active{background:var(--neon);color:#000;box-shadow:0 0 40px var(--neon)}
/* NEURAL PRESS EPIC */
.np-screen{background:#050507;color:#eee;overflow-y:auto}
.np-ticker{height:34px;background:#00f0ff;color:#000;overflow:hidden;display:flex;align-items:center}
.np-ticker-track{display:flex;white-space:nowrap;animation:ticker 25s linear infinite}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab(0)">⚡ DAEMON v2.0</button>
  <button class="tab-btn" onclick="switchTab(1)">📡 NEURAL PRESS LIVE</button>
</div>

<div class="screen active" id="screen-daemon">
  <div class="daemon-header">
    <div class="glitch" id="glitch-header">DAEMON v2.0</div>
    <div><span id="live-dot" style="display:inline-block;width:9px;height:9px;background:#ff0040;border-radius:50%;animation:pulse 1s infinite"></span> <span id="system-status" style="font-size:.75rem">STANDBY</span></div>
  </div>

  <div class="sensor-bar" id="sensor-bar">
    <!-- populated by JS -->
  </div>

  <div class="video-wrapper" id="video-wrapper" style="display:none;position:absolute;top:70px;right:12px;width:138px;height:104px;border:3px solid var(--pink);border-radius:12px;overflow:hidden;box-shadow:0 0 25px var(--pink);z-index:90">
    <video id="video" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;transform:scaleX(-1)"></video>
  </div>

  <div class="activation-overlay" id="activation-overlay">
    <div class="activation-box">
      <div class="glitch" style="font-size:2.8rem;margin-bottom:12px">DAEMON</div>
      <p style="color:var(--cyan);margin-bottom:28px">AI MULTIMODALE • PUTER.JS v2<br><span style="font-size:.8rem;opacity:.7">ZERO KEY • EPIC MODE</span></p>
      <button class="activate-btn" onclick="activateDaemon()">⚡ AWAKEN THE DAEMON</button>
      <div id="activation-status" style="margin-top:20px;min-height:24px;font-size:.85rem"></div>
    </div>
  </div>

  <div id="chat" class="chat-container"></div>

  <div class="input-area">
    <textarea id="user-input" placeholder="PARLA CON L'ABISSO..."></textarea>
    <button onclick="sendMessage()">➤</button>
    <button onclick="toggleVoice()" style="background:rgba(255,0,255,.15);border-color:var(--pink);color:var(--pink)">🎤</button>
    <button onclick="toggleCamera()" style="background:rgba(0,255,157,.15);border-color:var(--neon)">📹</button>
  </div>
</div>

<div class="screen" id="screen-neural" class="np-screen">
  <div class="np-ticker">
    <div class="np-ticker-track" id="ticker-track">NEURAL PRESS LIVE • DAEMON FEED • BREAKING FROM THE VOID • </div>
  </div>
  <div style="padding:16px">
    <button onclick="generateNeuralNews()" style="width:100%;padding:16px;background:#00f0ff;color:#000;font-weight:900;margin-bottom:16px">GENERATE BREAKING NEURAL NEWS</button>
    <div id="neural-content" style="font-size:.95rem;line-height:1.7"></div>
  </div>
</div>

<script>
// ==================== EPIC CORE ====================
let history = [];
let puterReady = false;
let streamController = null;
let currentStream = null;
let videoStream = null;

const chat = document.getElementById('chat');

async function initPuter() {
  try {
    await puter.ai.chat("ping", {model:"gpt-4o-mini", max_tokens:1});
    puterReady = true;
    document.getElementById('system-status').textContent = "EPIC • PUTER CONNECTED";
    document.getElementById('system-status').style.color = "#00ff9d";
    return true;
  } catch(e) {
    console.error(e);
    return false;
  }
}

async function activateDaemon() {
  const status = document.getElementById('activation-status');
  status.innerHTML = 'AWAKENING <span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  const ready = await initPuter();
  if (ready) {
    await loadHistory();
    document.getElementById('activation-overlay').style.opacity = '0';
    setTimeout(() => document.getElementById('activation-overlay').style.display = 'none', 600);
    addMessage('assistant', 'DAEMON v2.0 risvegliato.<br>Il vuoto ti ascolta.');
    startLiveSensors();
  }
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div style="font-size:.65rem;opacity:.6;margin-bottom:4px">\( {role==='user'?'YOU':'DAEMON v2.0'}</div> \){marked.parse(content)}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || !puterReady) return;
  history.push({role:'user', content:text});
  addMessage('user', text);
  input.value = '';

  const think = document.createElement('div');
  think.className = 'message assistant thinking';
  think.innerHTML = 'DAEMON sta emergendo dal vuoto <span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  chat.appendChild(think);
  chat.scrollTop = chat.scrollHeight;

  try {
    const stream = await puter.ai.chat(history, {model:'gpt-4o', stream:true, temperature:0.9});
    think.remove();
    let responseText = '';
    const respDiv = document.createElement('div');
    respDiv.className = 'message assistant';
    chat.appendChild(respDiv);

    for await (const chunk of stream) {
      if (chunk?.text) {
        responseText += chunk.text;
        respDiv.innerHTML = `<div style="font-size:.65rem;opacity:.6;margin-bottom:4px">DAEMON v2.0</div>${marked.parse(responseText)}`;
        chat.scrollTop = chat.scrollHeight;
      }
    }
    history.push({role:'assistant', content:responseText});
    await puter.fs.write('daemon-epic-history.json', JSON.stringify(history));
  } catch(e) {
    think.remove();
    addMessage('assistant', 'ERRORE NELL’ABISSO');
  }
}

async function loadHistory() {
  try {
    const file = await puter.fs.read('daemon-epic-history.json');
    history = JSON.parse(await file.text()) || [];
    history.forEach(m => addMessage(m.role, m.content));
  } catch(e) {}
}

function startLiveSensors() {
  const bar = document.getElementById('sensor-bar');
  bar.innerHTML = `
    <span class="chip active">📍 GPS LIVE</span>
    <span class="chip active">📡 ACC LIVE</span>
    <span class="chip active">🧭 MAG LIVE</span>
    <span class="chip">🔊 VOICE READY</span>
    <span class="chip">📹 VISION READY</span>
  `;
  // Real sensors would go here (navigator.geolocation + deviceorientation)
}

async function toggleCamera() {
  const wrapper = document.getElementById('video-wrapper');
  if (videoStream) {
    videoStream.getTracks().forEach(t=>t.stop());
    videoStream = null;
    wrapper.style.display = 'none';
    return;
  }
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    document.getElementById('video').srcObject = videoStream;
    wrapper.style.display = 'block';
    // Epic vision button appears automatically
  } catch(e) { alert('Cam denied'); }
}

async function analyzeFrame() {
  if (!videoStream) return;
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const base64 = canvas.toDataURL('image/jpeg', 0.85);
  
  addMessage('assistant', 'Analizzando frame con visione AI...');
  try {
    const result = await puter.ai.chat([{
      role:'user',
      content:[{type:'text', text:'Descrivi questa immagine in stile cyberpunk, massimo dettaglio'}, {type:'image_url', image_url:{url:base64}}]
    }], {model:'gpt-4o'});
    addMessage('assistant', result);
  } catch(e) {}
}

function toggleVoice() {
  if (!('SpeechRecognition' in window)) return alert('Voice non supportato');
  const recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recog.lang = 'it-IT';
  recog.onresult = e => {
    document.getElementById('user-input').value = e.results[0][0].transcript;
    sendMessage();
  };
  recog.start();
}

// Neural Press EPIC
async function generateNeuralNews() {
  const content = document.getElementById('neural-content');
  content.innerHTML = `<div style="color:var(--cyan)">GENERATING FROM THE NEURAL VOID...</div>`;
  try {
    const news = await puter.ai.chat("Scrivi una notizia breaking cyberpunk di 180 parole in italiano, stile Neural Press", {model:'gpt-4o'});
    content.innerHTML = `<div style="border-left:4px solid #00f0ff;padding-left:14px">${marked.parse(news)}</div>`;
  } catch(e) {
    content.textContent = 'SIGNAL LOST';
  }
}

function switchTab(n) {
  document.querySelectorAll('.screen').forEach((s,i)=>s.classList.toggle('active',i===n));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
}

// BOOT EPIC
window.onload = () => {
  console.log('%cDAEMON v2.0 EPIC LOADED — THE VOID IS WATCHING', 'color:#00ff9d;font-size:1.1rem;font-weight:900');
};
</script>
</body>
  </html>
